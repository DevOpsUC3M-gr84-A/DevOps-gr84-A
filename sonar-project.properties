# 1. Identificadores del proyecto en SonarCloud
sonar.organization=devopsuc3m-gr84-a
sonar.projectKey=DevOpsUC3M-gr84-A_DevOps-gr84-A

# 2. Metadatos
sonar.projectName=NEWSRADAR
sonar.projectVersion=1.2

# 3. Configuración de análisis
# Subimos la base a la carpeta raíz del backend
sonar.sources=newsradar_api
sonar.language=py
sonar.python.version=3.11

# 4. Ajustamos exclusiones para que no analice los tests como si fueran código
sonar.exclusions=**/__pycache__/**, **/*.pyc, venv/**, docs/**, newsradar_api/tests/**

# 5. Reporte de cobertura de código
sonar.python.coverage.reportPaths=coverage.xml