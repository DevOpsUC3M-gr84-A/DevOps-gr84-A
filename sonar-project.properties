# 1. Identificadores del proyecto en SonarCloud
sonar.organization=devopsuc3m-gr84-a
sonar.projectKey=DevOpsUC3M-gr84-A_DevOps-gr84-A

# 2. Metadatos
sonar.projectName=NEWSRADAR
sonar.projectVersion=1.2

# 3. Configuración de análisis
sonar.python.version=3.11
sonar.sourceEncoding=UTF-8
# Indicamos los archivos fuente para el backend (Python) y el frontend (JavaScript)
sonar.sources=newsradar_api/app, newsradar_ui/src

# 4. Exclusiones (Ignoramos dependencias, tests de front/back y configs)
sonar.exclusions=**/__pycache__/**, **/*.pyc, venv/**, docs/**, newsradar_api/tests/**, newsradar_ui/src/**/*.test.tsx, newsradar_ui/src/**/*.test.ts, newsradar_ui/src/setupTests.ts, newsradar_ui/src/reportWebVitals.ts

# 5. Reporte de cobertura de código
sonar.python.coverage.reportPaths=coverage.xml # Backend (Python)
sonar.javascript.lcov.reportPaths=newsradar_ui/coverage/lcov.info # Frontend (JavaScript)