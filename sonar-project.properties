# 1. Identificadores del proyecto en SonarCloud
sonar.organization=devopsuc3m-gr84-a
sonar.projectKey=DevOpsUC3M-gr84-A_DevOps-gr84-A

# 2. Metadatos
sonar.projectName=NEWSRADAR
sonar.projectVersion=1.3

# 3. Configuración de análisis
# Analizamos desde la raíz para que el mapeo del XML sea directo
sonar.sources=newsradar_api/app
sonar.python.version=3.11
