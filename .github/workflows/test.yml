# 1. Nombre del pipeline
name: Tests and Coverage

# 2. Disparadores (Triggers): Cuándo se ejecuta este pipeline
on:
  # 2.1. Al integrar código en la rama principal, desarrollo o cualquier rama de funcionalidad
  push:
    branches: [main, develop, feature/*]
  # 2.2. Al abrir o actualizar una Pull Request hacia las ramas principales
  pull_request:
    branches: [main, develop]

# 3. Definición de los trabajos (Jobs)
jobs:
  # 3.1. Trabajo de pruebas y cobertura multiversión
  test:
    # 3.1.1. Entorno de ejecución (Servidor virtual proporcionado por GitHub)
    runs-on: ubuntu-latest

    # 3.1.2. Matriz de ejecución: Lanza 2 servidores paralelos, uno con Python 3.11 y otro con 3.12
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    # 3.1.3. Secuencia de pasos a ejecutar en cada servidor de la matriz
    steps:
      # Paso 1: Descargar el código del repositorio al servidor virtual
      - uses: actions/checkout@v4

      # Paso 2: Configurar la versión de Python correspondiente a la iteración de la matriz
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      # Paso 3: Instalación de dependencias del proyecto y herramientas de pruebas
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r newsradar_api/requirements.txt
          pip install -r newsradar_api/requirements-dev.txt

      # Paso 4: Ejecución aislada de pruebas unitarias (con salida de consola limpia y detallada)
      - name: Run unit tests
        run: |
          pytest newsradar_api/tests/unit/ -v --tb=short

      # Paso 5: Ejecución aislada de pruebas de integración
      - name: Run integration tests
        run: |
          pytest newsradar_api/tests/integration/ -v --tb=short

      # Paso 6: Generación de reportes de cobertura globales (XML y HTML)
      # Se accede a la carpeta de la API, se ejecutan todos los tests y se mueven los reportes a la raíz
      - name: Generate coverage report
        env:
          PYTHONPATH: .
        run: |
          cd newsradar_api
          pytest tests/unit/ tests/integration/ --cov=app --cov-report=xml --cov-report=html --cov-report=term-missing
          mv -f coverage.xml ../coverage.xml || true
          mv -f htmlcov ../htmlcov || true

      # Paso 7: Subida del reporte XML a Codecov para generar métricas en el repositorio
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      # Paso 8: Archivar el reporte visual HTML en GitHub Actions para que los devs puedan descargarlo
      # El 'if: always()' garantiza que el reporte se guarde aunque algún test haya fallado
      - name: Archive coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: htmlcov/