name: Continuous Integration (CI)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # Descargar el código del repositorio al servidor virtual
      - name: Checkout repository code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Configurar el entorno de ejecución
      - name: Setup Python 3.11 environment
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # Instalación de dependencias del proyecto y herramientas de QA
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r newsradar_api/requirements.txt
          pip install -r newsradar_api/requirements-test.txt
          pip install flake8 pytest pytest-cov

      # Análisis estático de código (Linting)
      - name: Run static code analysis (Flake8)
        run: |
          flake8 newsradar_api/app --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 newsradar_api/app --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      # Ejecución de pruebas automatizadas con generación de cobertura
      - name: Run unit tests (Pytest) with coverage report
        env:
          PYTHONPATH: newsradar_api
        run: |
          pytest newsradar_api/tests/unit/ newsradar_api/tests/integration/ --cov=app --cov-report=xml || true

      # Análisis de calidad y métricas (SonarCloud)
      - name: Run SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
