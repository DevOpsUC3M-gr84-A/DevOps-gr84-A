[pytest]
testpaths = tests/
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
addopts = --cov=app --cov-report=html --cov-report=term-missing --strict-markers -v
minversion = 7.0

filterwarnings =
    ignore:Support for class-based `config` is deprecated.*:pydantic.warnings.PydanticDeprecatedSince20
    ignore:.*on_event is deprecated, use lifespan event handlers instead\..*:DeprecationWarning
    ignore:Accessing argon2.__version__ is deprecated.*:DeprecationWarning

markers =
    unit: Unit tests for individual functions and classes
    integration: Integration tests for multiple components
    performance: Performance and load tests