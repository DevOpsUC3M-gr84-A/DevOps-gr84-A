services:
  # Servicio del Backend API
  backend:
    build:
      context: ./newsradar_api
      dockerfile: Dockerfile
    image: newsradar_backend_image
    container_name: newsradar_backend_container
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql://postgres:devops2026@db:5432/newsradar
    volumes:
      - ./newsradar_api/app:/app/app
    restart: unless-stopped
    depends_on:
      - db

  # Servicio de Base de Datos PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: newsradar_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: devops2026
      POSTGRES_DB: newsradar
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
