services:
  # Servicio del Backend API
  backend:
    build:
      context: ./newsradar_api
      dockerfile: Dockerfile
    image: newsradar_backend_image
    container_name: newsradar_backend_container
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - ELASTICSEARCH_URL=http://elasticsearch:9200
    volumes:
      - ./newsradar_api/app:/app/app
    restart: unless-stopped
    depends_on:
      - elasticsearch

  # Motor documental para noticias y artículos
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: newsradar_elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data

volumes:
  elasticsearch_data:
