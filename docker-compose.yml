services:
  api-backend:
    build:
      context: ./newsradar_api
      dockerfile: Dockerfile
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-devopsuc3m-gr84-a}/newsradar-api:${IMAGE_TAG:-local}
    container_name: newsradar-api-backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      APP_HOST: ${APP_HOST:-0.0.0.0}
      APP_PORT: ${APP_PORT:-8000}
      ELASTICSEARCH_URL: ${ELASTICSEARCH_URL:-http://host.docker.internal:9200}
      NEWSRADAR_CORS_ORIGINS: ${NEWSRADAR_CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
      NEWSRADAR_CORS_ALLOW_ORIGIN_REGEX: ${NEWSRADAR_CORS_ALLOW_ORIGIN_REGEX:-}
      NEWSRADAR_CORS_ALLOW_CREDENTIALS: ${NEWSRADAR_CORS_ALLOW_CREDENTIALS:-true}
      NEWSRADAR_ADMIN_PASSWORD: ${NEWSRADAR_ADMIN_PASSWORD:-admin_change_me}
      NEWSRADAR_LECTOR_PASSWORD: ${NEWSRADAR_LECTOR_PASSWORD:-lector_change_me}
    restart: unless-stopped
