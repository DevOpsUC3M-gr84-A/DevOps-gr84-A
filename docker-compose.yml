services:
  # Servicio del Backend API (FastAPI + Uvicorn)
  api-backend:
    build:
      context: ./newsradar_api
      dockerfile: Dockerfile
    image: newsradar_backend_image
    container_name: newsradar_backend_container
    # Inyección de variables de entorno desde el .env local del backend.
    # Permite mantener SMTP, contraseñas, URLs y demás secretos fuera del compose.
    env_file:
      - ./newsradar_api/.env
    ports:
      - "8000:8000"
    environment:
      # Estos overrides tienen prioridad sobre el .env y fijan defaults seguros
      # para arranque en desarrollo aunque el .env esté incompleto.
      - ENVIRONMENT=development
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      # DATABASE_URL must be provided at deploy time to avoid embedding secrets in the compose file.
      # Injected at runtime via environment; do NOT hardcode passwords here (Sonar rule).
      - DATABASE_URL=${DATABASE_URL}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:8000}
      # Admin/lector passwords are injected via environment in CI/CD or orchestrator.
      # Avoid defaults with secrets so Sonar does not flag plaintext secrets.
      - NEWSRADAR_ADMIN_PASSWORD=${NEWSRADAR_ADMIN_PASSWORD}
      - NEWSRADAR_LECTOR_PASSWORD=${NEWSRADAR_LECTOR_PASSWORD}
    volumes:
      # Persistencia de la base de datos SQLite en el host. La carpeta debe
      # pertenecer al UID 1001 (appuser) o ser escribible por él.
      - ./newsradar_api/data:/app/data
      # Hot-reload del código fuente en desarrollo. Se monta en :ro porque
      # uvicorn solo necesita leer ficheros para detectar cambios; así
      # appuser nunca intentará escribir __pycache__ en el host.
      - ./newsradar_api/app:/app/app:ro
      # Tests montados en :ro para que pytest los ejecute sin reconstruir la imagen.
      - ./newsradar_api/tests:/app/tests:ro
      # htmlcov en bind-mount: el evaluador abre el informe directamente desde su host.
      - ./newsradar_api/htmlcov:/app/htmlcov
    # Override del CMD del Dockerfile para activar el reloader en local.
    # En producción la imagen se ejecuta con el CMD por defecto (sin --reload).
    command:
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload
      - --reload-dir
      - /app/app
    restart: unless-stopped
    depends_on:
      - elasticsearch
      - postgres

  # Servicio del Frontend (React + Vite, dev server en contenedor)
  # RNF10: el evaluador NO necesita Node.js instalado; `docker compose up`
  # levanta también la UI en http://localhost:5173.
  frontend:
    build:
      context: ./newsradar_ui
      dockerfile: Dockerfile
    image: newsradar_frontend_image
    container_name: newsradar_frontend_container
    ports:
      - "5173:5173"
    environment:
      # Las llamadas del navegador salen del host del evaluador, no del contenedor,
      # por lo que la API debe resolverse vía el puerto publicado (localhost:8000).
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:8000}
    depends_on:
      - api-backend
    restart: unless-stopped

  # Base de datos relacional PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: newsradar_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-newsradar_user}
      # Password injected at runtime (no plaintext in compose). Add ${POSTGRES_PASSWORD}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-newsradar_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Motor documental para noticias y artículos
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: newsradar_elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data

volumes:
  elasticsearch_data:
  postgres_data:
